<!DOCTYPE html>
<html>
<head>
    <title>Get User Info</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #2c2f33;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            color: #7289da;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            background: #7289da;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5b6eae;
        }

        .card {
            margin-top: 30px;
            background: #23272a;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
        }

        img {
            width: 128px;
            border-radius: 50%;
            cursor: pointer;
            margin: 10px;
        }

        .banner {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>Get User Info</h1>

<input type="text" id="userId" placeholder="Enter Discord User ID">
<button onclick="lookupUser()">Search</button>

<div id="result"></div>

<script>
async function lookupUser() {
    const userId = document.getElementById("userId").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Loading...";

    try {
        const response = await fetch(`/api/user?id=${userId}`);
        const data = await response.json();

        if (data.error) {
            resultDiv.innerHTML = "User not found.";
            return;
        }

        resultDiv.innerHTML = `
            <div class="card">
                <h2>${data.username}</h2>
                <p><strong>Created:</strong> ${data.createdAt}</p>
                <div>
                    <img src="${data.avatar}" onclick="downloadImage('${data.avatar}', 'avatar.png')" title="Click to download PFP">
                </div>
                ${data.banner ? `
                <div>
                    <img class="banner" src="${data.banner}" onclick="downloadImage('${data.banner}', 'banner.png')" title="Click to download Banner">
                </div>` : "<p>No banner</p>"}
            </div>
        `;
    } catch (err) {
        resultDiv.innerHTML = "Error fetching user.";
    }
}

function downloadImage(url, filename) {
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
</script>

</body>
</html>
