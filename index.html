<!DOCTYPE html>
<html>
<head>
    <title>Get User Info</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1e1f22;
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            color: #5865F2;
        }

        input {
            padding: 12px;
            width: 350px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background: #2b2d31;
            color: white;
        }

        button {
            padding: 12px 20px;
            background: #5865F2;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 5px;
        }

        button:hover {
            background: #4752c4;
        }

        .card {
            margin-top: 40px;
            background: #2b2d31;
            display: inline-block;
            padding: 25px;
            border-radius: 15px;
            width: 400px;
        }

        img {
            width: 120px;
            border-radius: 50%;
            margin: 10px;
            cursor: pointer;
        }

        .banner {
            width: 100%;
            border-radius: 10px;
            margin-top: 15px;
        }

        .note {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Get User Info</h1>
    <input type="text" id="userId" placeholder="Enter Discord User ID">
    <button onclick="lookupUser()">Search</button>

    <div id="result"></div>
</div>

<script>
function lookupUser() {
    const userId = document.getElementById("userId").value.trim();
    const resultDiv = document.getElementById("result");

    if (!userId || isNaN(userId)) {
        resultDiv.innerHTML = "<p>Please enter a valid Discord ID.</p>";
        return;
    }

    // Decode account creation date from Discord Snowflake
    const discordEpoch = 1420070400000;
    const timestamp = (BigInt(userId) >> 22n) + BigInt(discordEpoch);
    const createdDate = new Date(Number(timestamp));

    resultDiv.innerHTML = `
        <div class="card">
            <h2>User ID: ${userId}</h2>
            <p><strong>Account Created:</strong><br>${createdDate.toUTCString()}</p>

            <div class="note">
                ⚠️ Due to Discord API restrictions, usernames, banners, and avatars 
                cannot be fetched without a secure backend.
            </div>
        </div>
    `;
}
</script>

</body>
</html>
