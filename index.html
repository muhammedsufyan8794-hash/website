<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomatoAdmin Uploader</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; padding: 40px; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #ff6347; margin-top: 0; }
        input, textarea { width: 100%; background: #2d2d2d; border: 1px solid #444; color: #fff; padding: 12px; box-sizing: border-box; border-radius: 6px; margin-bottom: 15px; }
        textarea { height: 350px; font-family: monospace; font-size: 12px; }
        button { width: 100%; padding: 15px; background: #ff6347; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #e5533d; }
        .output { background: #000; padding: 20px; margin-top: 25px; border-left: 4px solid #ff6347; display: none; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #bbb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍅 TomatoAdmin Script Host</h2>
        
        <label>GitHub Personal Access Token (Needs 'repo' scope)</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
        
        <label>GitHub Username</label>
        <input type="text" id="username" placeholder="Your GitHub Name">
        
        <label>Repository Name</label>
        <input type="text" id="repo" placeholder="The name of this repository">

        <label>Script Content (Up to 2M+ lines)</label>
        <textarea id="code" placeholder="Paste your code here..."></textarea>
        
        <button onclick="uploadToRepo()">Generate TomatoAdmin Loadstring</button>

        <div id="result" class="output">
            <p><strong>Custom Link:</strong><br><span id="rawLink" style="color: #00ff00; font-size: 12px;"></span></p>
            <p><strong>Roblox Loadstring:</strong></p>
            <textarea id="loadstring" style="height: 80px; color: #00ffff;"></textarea>
        </div>
    </div>

    <script>
        async function uploadToRepo() {
            const token = document.getElementById('token').value;
            const user = document.getElementById('username').value;
            const repo = document.getElementById('repo').value;
            const content = document.getElementById('code').value;
            const fileName = "TomatoAdmin.lua";

            if(!token || !user || !repo || !content) {
                alert("Fill in all fields!");
                return;
            }

            // GitHub API requires content to be Base64 encoded
            // Using a helper to handle large strings/UTF-8
            const b64Content = btoa(unescape(encodeURIComponent(content)));

            try {
                // First, check if file exists to get the SHA (required for updating)
                let sha = "";
                const getFile = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${fileName}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                if (getFile.status === 200) {
                    const fileData = await getFile.json();
                    sha = fileData.sha;
                }

                const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${fileName}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: "Updating TomatoAdmin Script",
                        content: b64Content,
                        sha: sha // Only needed if file already exists
                    })
                });

                if (response.ok) {
                    const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${fileName}`;
                    const loadstring = `loadstring(game:HttpGet("${rawUrl}"))()`;
                    
                    document.getElementById('rawLink').innerText = rawUrl;
                    document.getElementById('loadstring').value = loadstring;
                    document.getElementById('result').style.display = 'block';
                } else {
                    const error = await response.json();
                    alert("Error: " + error.message);
                }
            } catch (e) {
                alert("Upload failed. Check your console.");
                console.error(e);
            }
        }
    </script>
</body>
</html>
