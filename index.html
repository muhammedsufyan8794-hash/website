<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Script Uploader</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        textarea { width: 100%; height: 300px; background: #2d2d2d; color: #00ff00; border: 1px solid #444; }
        .container { max-width: 800px; margin: auto; }
        .output { background: #000; padding: 15px; margin-top: 20px; border-radius: 5px; display: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        input[type="text"] { width: 100%; margin-bottom: 10px; padding: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Roblox Script to Loadstring</h2>
        <input type="password" id="token" placeholder="Enter GitHub Personal Access Token">
        <textarea id="code" placeholder="Paste your 2 million lines of code here..."></textarea>
        <br><br>
        <button onclick="uploadToGist()">Generate Loadstring</button>

        <div id="result" class="output">
            <p><strong>Raw Link:</strong> <br><span id="rawLink"></span></p>
            <p><strong>Roblox Loadstring:</strong></p>
            <textarea id="loadstring" style="height: 60px;"></textarea>
        </div>
    </div>

    <script>
        async function uploadToGist() {
            const token = document.getElementById('token').value;
            const codeContent = document.getElementById('code').value;
            
            if(!token || !codeContent) {
                alert("Please provide both a Token and Code!");
                return;
            }

            const response = await fetch('https://api.github.com/gists', {
                method: 'POST',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    description: "Roblox Script",
                    public: true,
                    files: { "script.lua": { content: codeContent } }
                })
            });

            const data = await response.json();
            if(data.files) {
                const rawUrl = data.files["script.lua"].raw_url;
                const loadstring = `loadstring(game:HttpGet("${rawUrl}"))()`;
                
                document.getElementById('rawLink').innerText = rawUrl;
                document.getElementById('loadstring').value = loadstring;
                document.getElementById('result').style.display = 'block';
            } else {
                alert("Error: " + (data.message || "Could not upload"));
            }
        }
    </script>
</body>
</html>
